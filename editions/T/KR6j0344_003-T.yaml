body:
  text: 西天譯經三藏朝散大夫試鴻臚卿傳教大師臣法天奉詔譯復次持誦者往於河岸用白檀香作曼拏羅獻廣大供養時誦真言一阿庾多至第七日復作廣大供養至夜半彼摩拏賀哩尼夜叉女即來現身甚大苦惱女言呼我何作持誦者言汝為我婢女即聽允日給金錢一百贍彼行人等八人豐足使盡復與若不使盡不復與之復次持誦者往彼尼拘陀樹下以自飲酒肉食已不潔淨盥漱持誦真言一千遍至第七日復誦真言至中夜已來彼羯諾羯嚩帝夜叉女莊嚴具足與其僕從八百人俱悉現本身與彼行人同作歡樂即結為妻給與衣服飲食及金錢八文贍彼行人等一十二人悉得豐足復次持誦者於樺皮上用牛黃畫彼迦彌濕嚩二合哩夜叉女形像於寂靜處置一臥床於此床上誦真言一千遍於月盡日作廣大供養燃以酥燈時誦者默然彼女即來隨行人意而為妻子於臥床上留最上莊嚴至明旦時却還本處持誦之者不得邪慾若有所犯即令破壞復次持誦者於其㡧上畫彼女像身作金色一切莊嚴手執優鉢羅華如童女相用惹底華作供養燒安悉香誦真言八千遍至月盡日隨力供養燃以酥燈復誦真言至中夜時彼囉帝夜叉女即來現身同作歡樂即為妻子日給金錢二十五文及聖藥等贍彼行人及其徒眾悉令豐足復次持誦之者於自本舍臥床頭邊用白檀香作曼拏羅燒安悉香誦真言至一月於十五日夜隨力獻供養復誦真言至中夜彼鉢訥彌儞夜叉女即來現身隨誦者意以結為妻即與種種聖藥及聖物等復次持誦者往無憂樹下食於酒肉已用塗香好華作供養已誦真言一千遍彼曩致夜叉女即來現身或為母或為姊妹或為妻子若得為妻日給金錢八文及種種聖藥等若得為母供給衣食及金百兩若為姊妹於千由旬內所須女人即為取來及供給飲食衣服種種聖藥等復次持誦者於樺皮上用恭俱摩香畫彼阿努囉儗尼夜叉女形於月初一日以香華燈及塗香等作供養一日三時持誦真言至十五日燃以酥燈隨力作供養持誦夜至明旦彼夜叉女即來現身隨行人意即為彼妻日給金錢一千及與種種聖藥壽命一千歲如是名為所說降伏諸部多大教王夜叉女成就之法爾時金剛手菩薩大祕密主言若有夜叉女不依我三昧住者誦此忿怒明王真言決定破壞真言曰唵引度𭍌二合羯茶羯茶阿目迦藥乞叱二合尼引紇哩二合引惹𠺁入吽發吒半音誦此真言一千遍彼女速來若不速來頭目俱破剎那命終墮八大地獄復說印相法以二手作拳二小指相交此大不空忿怒鉤印能鉤三界復說夜叉女印以二手平掌二中指顛倒以無名指出外頭指與小指相捻此是一切夜叉女最上根本印結此印時彼夜叉女速來現身復用此印以右手母指作鉤召復誦此真言曰唵引紇哩二合引阿引誐蹉誦此真言能鉤召一切夜叉女復用前印以左手母指作發送誦此真言曰唵引紇哩二合引誐蹉誐蹉藥乞叱二合尼引尸伽囉二合補曩囉引誐摩曩引野娑嚩二合引賀引復說印相以二手作拳舒二中指此印能令一切夜叉女速來現前誦此真言曰唵引摩賀引藥乞叱二合尼引昧上曩必哩二合曳引娑嚩二合引賀引復用二手作拳舒二小指此印能令一切夜叉女速來親近真言曰唵引迦引摩菩疑濕嚩二合哩娑嚩二合引賀引復用二手如執刀劍勢此是一切夜叉女心印誦此一字真言曰翅入引復用二手作拳舒於頭指中指此是一切夜叉女香華燈塗供養印誦此真言曰唵引薩哩嚩二合摩努賀引哩尼引娑嚩二合引賀引如是說此降伏諸部多大教王夜叉女成就法已爾時會中有龍女主即從座起五體投地禮金剛手菩薩足各各說自根本心真言曰普入唵引普入阿難多目契普入悉哩二合引普入嚩引酥吉目契引普入伊普入鉢訥彌二合儞普入阿普入摩賀引鉢訥彌二合儞普入尾普入羯哩俱二合吒迦目契引普入摩普入設始儞野普入染普入入嚩二合引攞目契引普入骨嚕二合普度摩入目契復說八大龍女主成就之法時持誦之者先於龍堂之內持誦真言一洛叉令法精熟得一切龍女心大歡喜然後於月初五日往龍堂內入於龍池用香華塗香及乳汁依法作供養即誦八大龍女主真言一千遍時彼龍女速來池內用乳汁白檀香水獻閼伽已持誦者言善來與我為妻女即聽允日給金錢八文或令殺冤或令救護隨意無違復次持誦之者往二河合流之岸用酥乳為食誦真言八千遍時彼龍女即來現身以其好華戴彼頂上告言汝為我妻龍女即允日給金錢五文及上妙飲食等復次持誦者往龍堂內誦真言一千遍剎那中間令其龍女患於頭痛速來言曰呼我何作行人告言與我為母龍女即允供給衣服飲食可贍誦者徒眾五人俱足復次持誦者往蓮池岸上誦真言八千遍龍女速來同作歡樂即得與妻日給金錢八文使盡復與若畜之不用更不與之復次持誦者往二河合流之岸於夜分時誦真言八千遍時彼龍女即來現身行人言曰善來與我為妻龍女即允日給黃金一兩復次持誦者往大海岸於夜分時誦真言八千遍時彼龍女即來現身行人言曰汝為姊妹女即允之日給金錢一文及衣服等復次持誦者往彼龍堂復入龍池水至臍輪即誦真言八千遍時彼龍女即來現身以其好華戴彼頂上告曰汝為我妻龍女即允日給金錢八文及上味飲食等復次持誦者往彼龍堂內於夜分中誦真言至明旦時彼龍女莊嚴其身即現人前用華水獻閼伽告言善來汝為我妻龍女即允與持誦者種種聖藥聖物等能滿一切願復次持誦者往彼龍堂誦真言一阿庾多龍女即來同作歡樂誦者言曰汝為我妻龍女即允日給金錢五文及上味飲食衣服等復次持誦者於夜分中近彼龍堂誦真言八千遍龍女即來以龍華戴彼頂上持誦者曰與我為妻龍女即允及與彼誦者最上莊嚴等復說龍女三昧真言句召真言曰唵引普阿誐蹉曩引擬儞引普復說塗香真言曰馱囕二合伊普復說香真言曰唵引普惡復說一切龍女三昧真言曰阿普憾引普鑁普復說發送真言曰普誐蹉誐蹉尸引伽囕二合布曩囉引誐麼曩引野復說印相法以二手仰合掌復合如頭髻內入二頭指以二母指相捻此是龍女三昧印能作一切事亦是外三昧印及發送供養此印同用復次以左手作拳母指舒左右手頭指竪立餘指並舒復用小指母指捏指甲餘指並舒此亦是龍女三昧印如是所說降伏諸部多大教王龍女成就之法爾時金剛手大祕密主作大忿怒相擲金剛杵說此真言曰唵引鼻引沙拏嚩日囉二合吽阿目枳引曩引擬儞引阿引羯哩沙二合野吽吽發吒半音發吒半音爾時金剛手菩薩說此真言之時一切龍女迷悶倒地頭頂疼痛命欲將終菩薩復言汝等龍女若不依我三昧得大過失速令命終墮八大地獄如是金剛手說此降伏諸部多大教王龍女成就法已爾時會中有緊曩囉女主即從座起五體投地禮金剛手菩薩足各說根本心真言曰唵引摩努賀哩引娑嚩二合引賀引唵引酥婆擬引娑嚩二合引賀引唵引尾舍引攞儞引怛哩二合引娑嚩二合引賀引唵引酥囉多必哩二合曳引娑嚩二合引賀引唵引阿濕嚩二合目契引娑嚩二合引賀引唵引尾迦引囉目契引娑嚩二合引賀引復說六緊曩囉女主成就法持誦者往山頂上誦真言八千遍作大供養用牛肉及安悉香同燒誦真言至中夜彼緊曩囉女即來現身持誦者不得怖畏彼女告曰呼我何作持誦者言與我為妻女即聽允背負行人詣諸天界與上味飲食等復次持誦者往於山下清齋誦真言一阿庾多彼緊曩囉女即來現身捧行人足種種承事即為妻子日給八文金錢及衣服等復次持誦者往彼河岸誦真言一阿庾多竟夜至明旦時彼緊曩囉女即來現身結為妻子日給金錢五文復次於夜分往二河合流之岸誦真言八千遍彼緊曩囉女即來現身第一日捨施第二日面前住立而發言語第三日同作歡樂即為妻子供給承事日與金錢八文及衣服等復次持誦者往於山頂上食酒肉已誦真言一阿庾多彼緊曩囉女即來現身如天女像面前而住默作歡樂即得為妻日給金錢八文及上味飲食等如是說此降伏諸部多大教王緊曩囉女成就之法爾時金剛手大祕密主告大自在天言汝今諦聽我已降伏三界諸天如僕從等所有大惡諸天我亦降伏時大自在天白菩薩言唯願說此降伏三界大惡諸天真言印相及㡧像等成就之法時會大眾讚大自在天言善哉善哉能問菩薩降伏三界大惡諸天成就之法時金剛手菩薩即說大忿怒曼拏羅成就之法先作四方曼拏羅開於四門門安樓閣具足十六分外作金剛界內安忿怒明王遍身熾焰如彼劫火身大青色髑髏莊嚴作大笑大惡相能怖畏三界有情於忿怒明王右邊安大自在天身白如月亦如真珠色白乳色三目四臂手執三叉及拂明王左邊安圓滿那羅延天手執輪寶杖拂螺明王後安帝釋天主明王面前安大梵天六面手執寶幢身白如雪亦如軍那花及月色復次帝釋前安龜座或安月色如真珠及乳或安迦哩底計野天作赤色以手執拂帝釋天黃色身有千目一切莊嚴以手執拂大自在天乘牛那羅延天乘金翅鳥帝釋天乘象迦哩底計野天乘孔雀外第二重曼拏羅安八部多女其名曰鉢訥摩二合嚩怛也二合引摩賀引鉢訥摩二合尾部沙尼酥囉賀引哩尼引嚩囉賀引哩引摩賀引囉帝引部沙尼引惹誐怛波二合引隷儞引此八部多女即為大富鉢訥摩嚩怛也二合引及摩賀引鉢訥摩此二部多女身作白色尾部沙尼及酥囉賀引哩尼引此二部多女身作赤色餘四部多女身皆金色復次金剛阿闍梨身著青衣頂戴青冠及戴青華如前儀軌誦忿怒明王真言為一切眾生作大利益故剎那中間決定成就復說一切天人真言曰吽嚩日囉二合發吒半音持誦之間一切天人皆來成就復次作忿怒相立如舞踏勢即擲金剛杵誦真言曰吽此一吽字持誦之時能破一切天人爾時一切天女龍女夜叉女及部多女等依金剛手菩薩言剎那中間皆來成就復誦此真言曰唵引嚩日囉二合禰引鉢多二合摩賀引骨嚕二合駄賀曩捺賀鉢左摩引囉野吽吽發吒半音復次殺一切天魔及降伏彼等真言曰吽吽發吒半音發吒半音如是真言決定破壞一切魔先用忿怒明王印并真言作於擁護然令弟子入曼拏羅誦此覺悟真言曰唵引鉢囉二合尾舍鉢囉二合尾舍骨嚕二合引馱吽吽惡入入嚩二合引攞引摩引攞引俱攞引鼻引沙拏嚩日囉二合惡入誦此真言能句召降伏緊曩囉女等復次說降伏諸部多大教王忿怒曼拏羅儀軌真言曰唵引普室哩二合引星賀引特嚩二惹馱引哩尼引紇哩二合引誦此真言安鉢訥摩二合嚩怛也二合引部多女手執師子幢在忿怒明王東邊唵引吽部𭍌二合摩賀引鉢訥摩二合摩底達弩哩馱二合引哩尼引吽誦此真言安摩賀引鉢訥摩部多女手執弓箭在忿怒明王西邊唵引吽尾部引底盎俱舍馱引哩尼引吽𠺁入誦此真言安尾部沙尼部多女手執金剛鉤在忿怒明王南邊唵引吽部𭍌二合引酥囉賀引哩尼引進多摩尼特嚩二合惹馱引哩尼引誦此真言安酥囉賀引哩尼引部多女手執如意寶幢在忿怒明王北邊唵引室哩二合引嚩囉賀引哩尼引希瑟波二合賀悉帝二合引吽誦此真言安嚩囉賀引哩尼引部多女手執華在忿怒明王東北隅唵合室哩二合引囉怛泥二合引濕嚩二合哩度波吽誦此真言安摩賀引囉帝引部多女手執香爐在忿怒明王東南隅唵引室哩二合引普引沙尼引巘馱賀悉帝二合引吽誦此真言安部沙尼引部多女手執塗香在忿怒明王西南隅唵引室哩二合引惹誐怛波二合引隷泥引惡入誦此真言安惹誐怛波二合引隷儞部多女手執燈在忿怒明王西北隅復次說八大部多女印相用二手作拳舒二頭指此名摩竭金剛印復用此印安腰側亦名弓箭印復用右手作拳舒頭指復如鉤此名鉤印復用左手作拳舒中指此名如意寶幢印復用二手仰合掌以二頭指如鉤此名華印復用指互相交舒二頭指此名香印復用二手並舒各安臂上此名塗香印復用右手作拳竪之舒中指此名燈印復次忿怒明王說降伏諸部多曼拏囉儀軌已復說此八部多成就法真言無能勝部多真言曰唵引紇哩二合引𠺁入阿𡁠多部多真言曰唵引吽𠺁入布囉拏部多真言曰唵引紇哩二合引𠺁入阿布囉部多真言曰唵引部𭍌二合𠺁入尸陀林住部多真言曰唵引室𭍌二合𠺁入俱隷引濕嚩二合囉部多真言曰唵引嚕𠺁入阿部帝引濕嚩二合囉真言曰唵引賀囉二合𠺁入緊羯嚕怛莫部多真言曰唵引阿𠺁入復次持誦者於金剛手前誦前真言一洛叉令法精熟於十五日用酥酪糖乳為飲食作廣大供養燒安悉香竟夜持誦至明旦時彼無能勝部多決定速來若彼不來剎那命終彼若來時告言呼我何作持誦者曰為我僕從時彼部多即便承事復令行人即為持明能降帝釋及設始天女復負行人詣諸天上居帝釋位壽命七劫復次持誦者往詣舍利塔前於夜分中誦真言八千遍至第七日獻種種飲食燒安悉香復誦真言時彼部多即來人前告言呼我何作行人言曰為我僕從部多即允背負行人往四大洲所欲自在壽命千歲復次持誦者往金剛手菩薩宮殿內誦真言八千遍至第七日作廣大供養用素食乳酪等依法出生復誦真言至中夜時布囉拏部多現身而來即獻閼伽令彼歡喜即為僕從盡生承事能滿一切願亦能作於吉凶隨行人意獲壽一千歲復次持誦者往舍利塔前誦真言一阿庾多以為精熟然後於十五日隨力作供養誦真言至中夜時布囉拏部多速來人前告言呼我何作行人言曰為我僕從部多即允復令天女給侍承奉亦與現一切伏藏日給金錢五文及飲食衣服等壽命五百歲復次持誦者往尸陀林於夜分中誦真言八千遍至第七日用酒肉魚酥酪糖蜜乳粥及果子等依法出生燒安悉香誦真言至中夜時有大惡聲行人若聞不得驚怖即時部多與自徒眾圍繞而來出生供養彼即歡喜得一切部多皆為僕從能殺一切冤家日給金錢與彼行人獲壽一千歲復次持誦者往宮觀內用紅色華供養燒安悉香誦真言一阿庾多令法精熟復於二十九日夜分中用魚肉及種種飲食依法出生誦真言至中夜彼俱隷引濕嚩二合囉部多即現人前熾焰遍身作大惡相不得怖之部多言曰呼我何作行人言曰為我僕從部多即允盡生承事每日三時給金錢五文及上味飲食獲壽五百歲復次持誦者往大自在天祠宮殿之中於夜分時只以自身用紅色肉食用安悉香及蜜同燒誦真言八千遍於第一日夢見第二日現本身第三日面前住立告言呼我何作持誦者曰為我僕從部多即允復往諸天取無盡寶藏與彼行人及衣服飲食等復為行人說三世之事壽命二千歲復次持誦者往金剛手菩薩殿內於二十九日起首誦真言一阿庾多至七日令法精熟然後持誦者用白檀香作曼拏羅燒安悉香用白食酥酪乳粥等以為自食燃以酥燈坐吉祥草於初夜分持誦至中夜時彼部多即現人前用白檀水獻閼伽部多言曰呼我何作持誦者言為我僕從部多即允復與上味飲食種種聖藥及伏藏等背負行者往詣諸天所欲自在壽命五千歲如是降伏諸部多大教王僕從成就法已復次阿闍梨為利益故降伏一切部多僕從如佛所說此法難作若凡夫人懈怠人作惡業人妄語人愚癡人貧病人短壽人及身心不定人等於此儀軌皆不得作作之不成若阿闍梨儀軌具足無彼缺犯依法持誦必得成就若求富貴種種聖藥帝釋天主三種之壇無不成就何況人王及伏藏等所有一切天女剎那之間俱來成就所有邊地懈怠一切眾生皆得快樂此中四字大祕密能作一切成就復次說降伏八部多印相法以二手指相交竪中指如針此是無能勝部多印復用前印以中指入內舒二頭指復如鉤此是阿𡁠多部多印復用前印以二頭指如環二小指各舒此是布囉拏部多印復用十指相交此是阿布囉拏部多印復用前印二小指竪如針此是尸陀林住部多印復用前印各舒八指此是阿部帝濕嚩囉印復用前印母指入內舒二小指此是俱隷引濕嚩囉部多印復以二手合掌二頭指如鉤此是緊羯嚕怛摩部多最上印如是說降伏大教王八大部多印爾時金剛手菩薩復說金剛阿闍梨為利益故令吉祥大部多女心生歡喜承事成就法復次持誦者於金剛手菩薩前誦真言一洛叉令法精熟然後十五日隨力作供養燒安悉香誦真言竟夜至旦彼部多女即現人前用白檀香水獻閼伽告言善來部多女言呼我何作行人言曰與我為妻女即允之給與種種聖藥聖物及寶藏等此名順善成就復次說成就法持誦者用恭俱摩香於樺皮上畫吉祥大部多女像於夜分中獨自裸形往金剛手菩薩前誦真言八千遍彼部多女速現人前行人作歡喜相令女歡喜背負行人往諸天宮與帝釋位亦能養育一國人民獲壽一萬歲若不為成就頭目破壞身體乾枯剎那命終復次說殺一切部多女儀軌如前作曼拏羅畫忿怒殺相剎那中間能殺諸部多女此忿怒明王親說時持誦者用恭俱摩香畫彼形像以左足踏手擲金剛杵口誦吽字至七遍已剎那中間殺彼命終說此降伏諸部多大教王成就法已復說發遣賢聖儀軌持誦者依法讚歎恭敬禮拜誦此發遣真言曰野他引野他引摩賀引部覩引嘮捺囉二合娑他二合引喃鉢囉二合悶左覩娑嚩二合引賀引復次承事賢聖及發遣部多儀軌用紅色飲食香華等出生用帛蓋於生盤誦呪生真言三遍已如前依法讚歎恭敬作禮即發遣諸部多各還本處或住尸陀林宮觀廟宇或樹下河岸四衢道路及自在天祠等速令還位依我三昧各自守護若不還位我以大金剛杵破汝頭頂剎那命終墮大地獄復誦此真言曰野他引莎娑他二合曩誐蹉覩野他引酥欠娑嚩二合賀引如是發遣部多及大自在天時亦用音樂此是第二發遣儀軌已復說發遣儀軌所有住尸陀林宮觀內山頂上四衢道路諸部多等各令還位之時與彼出生誦此發遣真言曰三摩野底瑟姹二合覩部多引喃引三摩野滿怛囕二合播引攞曩骨嚕二合達惹引閉引薩摩引倪也二合鉢也二合嘮捺囉二合娑他二合曩鉢囉二合悶左覩娑嚩二合引賀引唵引阿謨伽嚩日囕二合俱舍羯囉羯囉羯茶羯茶吽𠺁入誦此真言時結此金剛鉤印舒二頭指即為發遣賢聖印此是降伏諸部多大教王第三發遣賢聖儀軌竟
