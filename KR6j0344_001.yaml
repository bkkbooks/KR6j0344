body:
  text: 西天譯經三藏朝散大夫試鴻臚卿傳教大師臣法天奉詔譯真實變化大勢身大身堅牢能破他如日壞劫大熾燃菩薩圓光亦如是功德清淨大寶海善能安住佛剎中時我一心歸命禮降伏部多最上王爾時佛告三界主金剛手菩薩說降伏一切部多大教王成就之法時金剛手菩薩言若有持誦之者求成就法於二河岸或尸陀林中或大樹下或賢聖宮觀或金剛手菩薩宮殿之內如是等處所作之法必得成就若諸部多經剎那間不令成就我即往彼破壞部多爾時大自在天合掌向前頭面禮足白菩薩言為我說此大金剛手忿怒主殺諸部多祕密神呪爾時金剛手菩薩讚言善哉善哉汝能請我說彼降伏一切部多祕密之法我今說之真言曰唵引嚩日羅入嚩二合引隸去賀曩賀曩薩哩嚩二合部旦引吽發吒半音爾時金剛手菩薩說此真言已於身毛孔中出無數金剛熾焰出彼焰時一切部多及諸眷屬於其身分悉皆乾枯而得命終所有一切天人帝釋梵王那羅延等亦復命終一切如來悉皆驚怪俱發聲言善哉善哉大吉祥金剛手三界主於如來法末之時善能調伏一切部多及諸眷屬爾時金剛手菩薩復說甘露祕密真言令諸部多速得還命真言曰唵引嚩日羅二合引喻試娑囉娑囉濕彌二合時金剛手菩薩說此真言於自手臂出大甘露風入一切部多及彼眷屬身中即得還命從地而起驚怖顫掉見大菩薩威德熾盛告言菩薩救我爾時大部多主無能勝亦起合掌頭面禮足告菩薩言願垂慈愍救護我等菩薩告言汝等部多及其眷屬依我法教利益一切衆生我即救汝所有四大洲界閻浮提內一切衆生作法持誦悉令成就所求聖藥聖寶或金銀真珠琉璃鉢訥摩囉誐寶酥哩也建底寶贊捺囉建底寶及最上飲食衣服好香華等悉令充足部多答言如是作法持誦之者如上珍寶我令充足亦復親近承事供養菩薩告言若持此一切如來教法所須香華衣服及諸珍寶悉得受用部多復言所有王怖冤敵怖乃至虎狼師子等怖悉令解脫無諸障礙菩薩復言無能勝大部多主汝等諦聽於末世中所有懈怠有情破戒之人作惡業人大妄語人等如所作法悉令成就若不成就汝部多女天女龍女夜叉女阿修羅女緊那羅女摩睺羅伽女迦樓那女毗舍遮女乾闥婆女等我令不空大金剛破碎頭目速得命終墮八大地獄爾時一切如來讚言善哉善哉金剛手為未來世一切衆生作大利益善說大菩薩不空成就精進大威力善轉一切法輪除一切苦種種廣大儀則印呪㡧像成就之法爾時金剛手菩薩復說還命真言曰唵引羯茶羯茶羯囉羯囉蜜哩二合旦𡁠去嚩引波野紇哩二合說此真言已一切天人迷悶躄地大怖顫動從地起已時大自在天白菩薩救我爾時金剛手菩薩安慰彼言莫怖莫怖我為汝等降伏部多主故令一切天人敬愛故爾時一切諸天天女亦作是言金剛手大忿怒主救我救我菩薩告言汝等天女若後有人受持我法速令成就當為承事及與金銀琉璃真珠珍寶鉢訥摩囉誐寶等一切財物時諸天女天童女夜叉女等俱發聲言於未來世若有受持菩薩法者我等當為承事所求財寶一切給與若違教旨不為給事令我種族悉皆破壞菩薩復言若違我教則謗一切如來汝等及一切部多頭目破壞即得命終墮八大地獄爾時金剛手大忿怒主讚言善哉善哉汝諸女等於後末法之時若有受持之者親自護衛承事供養爾時復有無能勝大部多主及彼眷屬皆從座起合掌向前禮彼金剛手大忿怒主足說自本心真言曰唵引室哩二合摩賀引部多俱羅遜捺哩吽唵引室哩二合尾惹野遜那哩紇哩二合引唵引室哩二合引尾摩攞遜那哩阿引唵引室哩二合引囉底遜那哩嚩引唵引室哩二合引摩努賀囉遜那哩尾引唵引室哩二合引馱嚩攞遜那哩莽唵引室哩二合引作乞芻二合滿曩遜那哩帝引此真言攝如是大部多主能施持誦之人富貴吉祥爾時復說緊那羅女成就之法若人持誦須臾之間速得成就復誦金剛手菩薩名號一切部多及彼眷屬皆來承事如為婢從菩薩復言若汝等眷屬不依我三昧者汝等眷屬皆令破壞時無能勝大部多主白菩薩言自今我等皆依菩薩三昧而住所有世間一切持誦之者悉獲成就若為障礙所作不成我等種族速得破壞復獲背一切如來三昧大罪令忿怒金剛破碎我頭命終之後墮八大地獄爾時金剛手菩薩復說八大部多主最上成就處所或河岸上或尸陀林或金剛手菩薩宮殿內於此作法一切部多女等決定俱來令得成就無復疑惑復說成就印法左手作堅固拳舒出中指此印用召請及供養令最上部多速與成就以二手合拳舒頭指此印能令持三昧者部多女速與成就以左手作堅固拳竪小指此印能令一切部多現前與作成就復舒左手頭指如鉤捺大母指此印能降伏一切部多以左手頭指及無名指舒展能鉤一切部多及除一切魔以左手作拳竪大母指此印能現前一切部多女以右手作拳竪小指此是部多女三昧印能作一切事以二手各舒用右手安腰側左手安右肩上此是最上根本心一切部多女大印結印之間得一切部多女速來現前若不速來身分乾枯不久命終爾時金剛手忿怒主復言若有部多女不依我三昧者以此忿怒真言與前真言同誦真言曰唵引羯荼阿引羯荼窣𭍌二合紇哩二合引誦已稱部多女名復誦此呪吽𠷑吒半音如是誦八百遍諸部多女悉皆速來若彼不來眼目頭面破壞乾枯不久命終若作法之處於二河岸上用白檀香塗曼拏羅即散香華燒安悉香誦此真言八千遍必得成就若於夜分誦此真言一千遍決定速來隨意所求悉皆充足至旦却回復留黃金百兩復次於河岸上用白檀香塗曼拏羅用酪飯出生加持八百遍如是七日之內彼決定來用閼伽水淨手令彼歡喜彼女告言子呼我何作持誦者言我要求官衣食豐足世所崇重部多女言汝願我從復次往金剛手菩薩殿內用迦囉尾囉華散上燒安悉香誦真言八千遍必得成就復次於夜分寂靜之處加持一千遍部多女速來即獻華座問訊彼女汝今善來與我為妻女即隨意及與最上聖藥聖物等能除一切冤家女即背負其夫詣諸天宮獲其壽命滿一萬歲復次往彼河岸用白華白香乳香焚燒誦真言八千遍即得成就復次於夜分誦真言一千遍彼女定來即以香華水淨手然後告言與我為妹女即為妹復與聖藥聖物等所有千由旬內所要女人即時取來復於賢聖空間殿內依法出生志心供養誦真言八千遍速得成就或誦一千遍彼女定來即以為妻日與千錢後背負於夫往詣遠處夫得一切自在獲壽五千歲命終之後得生王宮復次往二河合流之岸獻酒肉食散迦囉尾囉華燒安悉香誦真言八千遍速得成就復次夜分中作廣大供養復燃酥燈誦真言一千遍時部多女五女從來持誦者曰與我為妻彼女默然許之若彼不允即得破壞日日背負於夫往詣諸天令得自在壽五千歲命終之後得生王宮復次成就法於河岸上用恭俱摩香作曼拏羅燒沈香依法出生誦真言八千遍所作成就復次作廣大供養誦真言一千遍彼部多女放大光明四遠照曜而來現前以白檀香水灑淨女即歡喜而自問言呼我何作持誦者曰為我作母女遂許之如法養育日贍五百人供給所須獲壽一萬歲命終之後生婆羅門家復次成就之法於二河合流之岸作廣大供養燃於酥燈於夜分誦真言八千遍時部多女放大光明而來現前問言呼我何作持誦者曰我欲自在受於快樂彼女即允日與金錢十萬獲壽一萬歲命終之後生為人主此是八大部多女主成就之法爾時住尸陀林部多女從座而起五體投地禮金剛手菩薩是恭敬合掌說自根本真言曰唵引訖哩二合吽賀入復說住尸陀林部多女句召真言曰唵引吽羯茶羯茶薩哩嚩二合部引多引喃薩摩野摩耨波引羅野賀囉賀囉滿馱滿馱阿引訖囉二合摩訶引迦哩沙二合野普摩賀引嘮捺哩二合尾濕摩引舍引曩嚩引悉儞阿引誐蹉尸伽朗二合度嚨發吒半音復說一切部多女三昧真言曰唵引度曩度曩左羅左羅左引羅野左羅野鉢囉二合尾舍鉢囉二合尾舍賀囉賀囉底瑟吒二合底瑟吒二合三摩野摩耨波引羅野部濕摩二合舍引曩鉢囉二合吠去始儞吽吽𠷑吒半音𠷑吒半音娑嚩二合引賀引復說難瑟吒囉二合引羯囉引梨部多女真言曰唵引左羅左羅達迦達迦摩賀引部底儞去娑引達迦引喃必哩二合夜引拽娑囉娑囉尾娑囉尾娑囉羯茶羯茶惹仁左反羅播二合波野惹羅播二合波野伴惹伴惹覽誐覽誐仡哩二合恨拏二合仡哩恨拏二合吽吽𠷑吒𠷑吒半音紇哩二合娑嚩二合賀引復說具囉目契部多女真言曰唵引具囉目契濕摩二合舍引曩嚩引始儞引娑達迦引耨俱隸去阿鉢囉二合底賀多唵引拏曩莫入娑嚩二合引賀引復說部多女真言曰唵引惹哩惹二合囉目契尾囉尾囉尾囉唧多引哩唧二合多薩哩嚩二合設咄嚕二合婆演迦哩去賀曩賀曩捺賀捺賀鉢左鉢左摩引囉野摩引囉野阿迦引羅蜜哩二合怛踰二合婆演迦哩薩哩嚩二合曩引誐婆演迦哩引阿吒吒賀西儞引薩哩嚩二合部帝濕嚩二合哩他引他引他引他引馱引馱引馱引馱引唵引唵引唵引唵引娑嚩二合引賀引唵引迦摩羅路左儞如是真言若人志心依法持誦此部多女悉能愛護一切衆生令離苦惱彼持誦者若以酒食魚肉及種種美饌出生供養即得歡喜親近承事如婢從等日與持誦者衣服一對金錢一文乃至百由旬內所須女人即時將至承事供給直至命終彼方捨離如是金剛手大教王降伏毗舍遮女成就之法爾時贊拏迦怛也野儞大惡部多女於大會中即從座起五體投地禮金剛手大忿怒主足合掌恭敬說自根本心真言曰唵引骨嚨二合吽發吒半音復說酥囉迦怛也二合引野儞部多女真言曰唵引吽入嚩二合羅吽𠷑吒半音復說摩賀迦怛也二合引野儞部多女真言曰唵引訖哩二合引紇哩二合引吽吽呬引呬引發吒半音發吒半音娑嚩二合賀引復說嘮捺羅迦怛也二合引野儞部多女真言曰唵引嚕捺囉二合婆演迦哩去阿吒吒賀引西儞引娑引馱迦必哩曳摩賀引尾進怛囉二合嚕閉囉怛曩二合引誐哩引酥嚩囉拏二合賀悉底二合野摩儞紇哩二合多儞薩哩嚩二合耨佉鉢囉二合舍摩儞唵引唵引唵引吽吽吽尸伽羅二合悉地鉢囉二合野蹉紇哩二合引𠺁入娑嚩二合引賀引復說贊拏迦怛也二合引野儞部多女真言曰摩賀引部帝引濕嚩二合哩引唵引野摩儞仡哩二合旦儞阿迦引羅蜜哩二合怛踰二合儞嚩引羅尼引朅切身捺誐二合輸羅賀悉帝二合尸伽覽二合悉地孕二合那那引覩旦娑引達迦摩引倪也二合引波野底紇哩二合引娑嚩二合賀引復說嚕捺囉迦怛也二合引野儞部多女真言曰唵引呬引摩軍拏梨尾馱迦尾馱迦入嚩二合羅入嚩二合羅禰麼也二合軍拏羅部始帝囉引嚩拏摩他儞引婆誐鑁曩引倪也二合波野底娑嚩二合賀引復說軍拏羅迦怛也二合野儞部多女真言曰勃哩二合俱胝目契引羯吒羯吒馱引嚩馱引嚩入嚩二合羅入嚩二合羅虎多引設曩目契誐蹉誐蹉吠多引拏烏怛他二合引波儞引阿引尾舍阿引尾舍吽吽吽發吒半音婆誐鑁引曩引波野底紇哩二合娑嚩二合賀引復說惹野目契迦怛也二合野儞部多女真言曰唵引必底哩二合摩他儞迦賀迦賀惹野薩哩嚩二合引酥囉布𡁠帝吽賀入娑嚩二合賀引復說戍婆迦怛也二合引野儞部多女真言曰唵引輸婆必哩二合曳禰麼也二合路引左禰二迦引彌引濕嚩二合哩惹誐謨賀儞酥婆擬建引左曩摩引羅尾部沙尼耨布囉娑沒提二合阿引尾舍阿引尾舍嚩西嚩西布囉娑引馱迦必哩二合曳紇哩二合娑嚩二合賀引此是八大迦怛也二合野儞部多女真言若人依法持誦必得成就復次金剛手大祕密主降伏部多大教王說八大迦怛也二合野儞部多女印相法以二手作拳以小指相交舒頭指復鉤此是迦怛也二合野儞部多女印復用二手合交令頭指如鉤此是摩賀迦怛也二合野儞部多女印用前印以中指相捻內入小指此是破壞一切不信法者部多女印信者令生敬愛以前印各舒二頭指此是跋捺羅迦怛也二合野儞部多女印用香華塗香供養復用酒食魚肉出生剎那之間一切部多皆令成就復用二手作堅固拳以二頭指相交此是贊拏迦怛也二合野儞部多女印此印同用能禁縛一切部多復舒左手頭指能降伏一切部多女復用二手作拳以二小指相交舒二頭指復如鉤此印能鉤召三界諸天乃至大自在天大梵王等悉皆降伏速得成就如是金剛手大忿怒主大教王說八大迦怛也二合引野儞部多女印相之法復次金剛手大忿怒主說迦怛也二合引野儞部多女成就法於尸陀林中誦前真言八百遍至三日內令部多女速來即用人髑髏滿盛其血以為閼伽彼即歡喜而問之言呼我何作持誦者曰願為我母女即許之如法養育一切所須皆得圓滿壽五百歲命終之後生為人王復次往金剛手菩薩宮殿內於夜分中誦真言八千遍時部多女速來現身如天女相所求之事一切成就復次於夜分中往大自在天宮殿中誦真言一千遍第一日聞鈴鐸聲第二日部多女現天女相第三日彼女言曰汝欲何求持誦者曰要汝承事女即承事盡彼命壽時背負持誦者往須彌山大海上至毗沙門天王宮取其財寶供給充足如是閻浮提內端正童女須者與之令作歡娛壽五百歲命終之後得生王宮復次往二河合流之岸於夜分中誦真言八千遍得最上部多女及彼眷屬速來現前永為妻子日與金錢五文名衣一對令其受用復次於夜分中往於園林之內誦真言八百遍誦至第三日聞鈴鐸聲第四日遙見彼女第五日來至面前第六日與金錢五文第七日於自臥床頭邊作曼拏羅燒安悉香誦真言八百遍復有最上部多女速來親近同作歡樂當結為妻復與最上真珠瓔珞留於床上日與金錢二十五文名衣一對能除一切冤家獲壽五千歲命終之後生於王宮復次往空間賢聖宮殿於夜分中誦真言八百遍如是至三日後時部多女與八百眷屬同來彼處用白檀香水獻閼伽彼即歡喜尋與為妻復給衣服飲食供贍八百眷屬及聖藥等獲壽五千歲命終之後往生王宮復次於王舍城內誦真言八百遍已得精熟後更五夜用迦囉尾囉木為柴及摩羅帝華用作護摩八百遍時大部多女與五百眷屬莊嚴其身速來彼處即用華水獻閼伽令其歡喜或求為母或求為姊妹或求為妻隨持誦者意若彼為妻現童女相若彼為母如親子想能滿誦人一切所願壽一萬歲命終之後生於王宮復次十五日於夜分中往諸宮觀誦真言一萬遍即獻廣大供養至明旦時彼女即來用血為閼伽令得歡喜即為婢從日給金錢五文及上味飲食壽命五百歲如是八大迦怛也二合引野儞部多女成就之法復次金剛手大教王降伏一切部多僕從成就之法真言曰唵引囉引虎囉引虎摩賀引唧吒迦引喃捺哩捺囉二合赦呬多引囉他二合引野唵引虎虎虎虎虎仡哩二合恨拏二合曼娑悉地孕二合彌鉢囉二合野蹉娑嚩二合引賀引持誦者於夜分時將黑羖羊肉八兩往尸陀林中誦真言八百遍加持於肉然後以眼視四方高聲唱言我今賣肉即時尸陀林住部多女變身為婆羅門告誦者曰汝大丈夫賣肉欲要何物持誦者曰我要黃金女與金八兩即收金與肉女不授肉違金剛手敕女即命終爾時有大自在天與無數俱胝天人圍繞復有無數天女龍神緊曩羅摩睺羅伽等在大會中爾時大自在天即從座起五體投地禮金剛手大忿怒主足右繞三匝白菩薩言復為我說調伏三界一切部多及天龍藥叉天人衆等令生大怖除諸魔障能殺一切星曜及吠多拏布怛曩成就祕密曼拏囉法爾時文殊師利菩薩讚言善哉善哉大自在天汝能利益未來法末之時閻浮提內一切衆生能問菩薩調伏三界諸惡部多天龍夜叉緊那羅等成就祕密大曼拏羅法時金剛手菩薩即為說此曼拏羅成就法作四方曼拏羅四方作於四門上置樓閣具足十六分外置金剛界中安大忿怒明王身有圓光遍體熾焰作大青色四臂右第一手擲金剛杵左第一手竪頭指禁伏一切部多以二手結本印面大惡相利牙髑髏為冠以八大龍王莊嚴其身作降伏三界相足踏無能勝部多王立如舞踏勢或時大笑大吼光明焰赫如一俱胝日為三界主以二手作印二無名指相交令二頭指如鉤小指中指以大母指壓之此名最上祕密富貴印能降三界印復於明王前安大自在天明王右邊安那羅延天明王後安大梵天明王左邊安迦哩帝迦天東北隅安頻那野迦東南隅安日天放千光明西南隅安羅睺西北隅安難禰計濕嚩二合囉曼拏羅第二重供養一切賢聖身色如金一切莊嚴作歡喜相顧視忿怒主明王左邊復安烏摩女天明王前安福女天以手執華明王右邊安底路怛摩女天手執香爐一切莊嚴明王後面安月女天手執燈莊嚴最上耳璫環釧東南隅安寶莊嚴女天手執塗香一切莊嚴西南隅安辨才女天有無數音樂種種歌舞西北隅安夜叉女主手執寶鬘名酥囉遜那哩是一切夜叉主東北隅安部多女名阿虎底儞是一切部多身相端正廣目少年莊嚴具足頭髻如大青色敬愛修行者復於曼拏羅第三重東方安帝釋天東南隅安火天南方安閻魔王西南隅安羅剎主西方安水天西北隅安風天北方安毗沙門東北隅安月天如是曼拏羅各安本位儀則已時阿闍梨頂戴青冠身著青衣以右手擲金剛杵發是願言我為利益一切衆生故剎那之間速得成就此是金剛大忿怒主依三昧位住諸賢聖時阿闍梨結大忿怒印即入曼拏羅誦此請召真言曰唵引嚩日囉二合發吒半音復誦安住三昧真言曰唵引底瑟吒二合悉地孕二合吽誦此真言已引弟子入曼拏囉用青帛蓋於頭面時阿闍梨結忿怒明王印安弟子頂上即誦覺悟真言曰唵引鉢囉二合尾舍骨嚕二合馱吽吽惡入此真言持誦之時能令須彌山震動海水傾搖彼弟子能知三世之事知已能說即時與去蓋頭散華供養得見本尊此名灌頂學法供養降伏一切部多曼拏羅儀軌已
